[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_22", "npm", "python311"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "python3 -m pip install -r userbot_worker/requirements.txt"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "php artisan migrate --force && php artisan db:seed --class=AdminUserSeeder --force && php artisan view:cache && php artisan serve --host=0.0.0.0 --port=$PORT"
