[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_22", "npm", "python311"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm ci",
    "python3 -m venv userbot_worker/.venv",
    "userbot_worker/.venv/bin/python -m pip install --upgrade pip",
    "userbot_worker/.venv/bin/python -m pip install -r userbot_worker/requirements.txt"
]

[phases.build]
cmds = [
    "npm run build"
]

[start]
cmd = "chmod +x scripts/start-railway.sh && scripts/start-railway.sh"
